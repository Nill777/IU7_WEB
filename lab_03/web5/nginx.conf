user http;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

include /etc/nginx/modules.d/*.conf;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # Формат лога, который показывает, на какой upstream-сервер ушел запрос
    log_format  main_ext  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" '
                          '"$upstream_addr"'; # Эта переменная покажет IP:Port бэкенда

    access_log  /var/log/nginx/access.log  main_ext; # Используем расширенный формат лога

    sendfile        on;
    keepalive_timeout  65;

    # --- ПУНКТ 5: GZIP-СЖАТИЕ ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- ПУНКТ 5: НАСТРОЙКА КЕШИРОВАНИЯ ---
    proxy_cache_path /var/cache/nginx/weblab_cache levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # --- ПУНКТ 1: БАЛАНСИРОВКА ---
    # upstream для "читающих" инстансов (GET-запросы)
    upstream spring-boot-replicas {
        # Соотношение 2:1:1. На каждые 4 GET-запроса: 2 пойдут на 8080, 1 на 9091, 1 на 9092.
        server 127.0.0.1:8080 weight=2;
        server 127.0.0.1:9091;
        server 127.0.0.1:9092;
    }

    # upstream для "пишущего" инстанса (POST, PUT, PATCH, DELETE)
    upstream spring-boot-master {
        server 127.0.0.1:8080;
    }


	server {
	    listen       80;
	    server_name  localhost;

	    # --- ПУНКТ 4: ПОДМЕНА ИМЕНИ СЕРВЕРA ---
	    # Эта директива теперь будет работать, так как мы исправили проксирование
	    add_header Server "MyWebAppServer v2.0";
	    proxy_hide_header X-Powered-By;

	    # --- ПУНКТ 1d: Обработка ошибок ---
	    location @handle_write_error {
		proxy_pass http://spring-boot-master;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	    }

	    # --- ИСПРАВЛЕННЫЙ БЛОК: Единый location для всего API и Swagger ---
	    # Он ловит все запросы, начинающиеся с /api/v2/, /swagger-ui/ или /v3/api-docs/
	    location ~ ^/(api/v2/|swagger-ui/|v3/api-docs) {
		proxy_intercept_errors on;
		error_page 405 = @handle_write_error;

		# Игнорируем заголовки управления кешем, которые присылает Spring Boot
		proxy_ignore_headers Cache-Control Expires;
		# Устанавливаем наше собственное правило кеширования для этих запросов
		expires 1m; # Кешируем на 1 минут (для Swagger UI этого достаточно)

		# По умолчанию (для GET) используем реплики
		proxy_pass http://spring-boot-replicas;

		# Если метод на запись - меняем на master
		if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
		    proxy_pass http://spring-boot-master;
		}

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	    }

	    # --- ПУНКТ 3: Маршрутизация для /mirror ---
	    location /mirror/ {
		proxy_pass http://spring-boot-master/;
		proxy_redirect default;
		proxy_set_header Host $host;
	    }

	    # --- ПУНКТ 6: Мониторинг ---
	    location /monitoring/ {
		 proxy_pass http://127.0.0.1:3000/;
		 proxy_set_header Host $host;
	    }

	    # --- ОБСЛУЖИВАНИЕ СТАТИКИ ---

	    # Корень для статических файлов.
	    # !!! ЗАМЕНИТЕ НА СВОЙ ПОЛНЫЙ ПУТЬ !!!
	    root /path/to/your/project/static;

	    # Отдача главной страницы (п.1 из ВАЖНО)
	    location = / {
		try_files /index.html =404;
		expires 1d;
	    }

	    # Отдача остальных статических файлов (картинки, css)
	    location / {
		try_files $uri $uri/ =404;
		expires 1d;
	    }
	}
}