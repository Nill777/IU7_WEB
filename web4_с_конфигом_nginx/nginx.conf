user http;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

include /etc/nginx/modules.d/*.conf;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    upstream spring_boot_app {
        server 127.0.0.1:8080;
    }

    server {
        listen       80;
        server_name  localhost;

	charset utf-8;

        root   /usr/share/nginx/html/web4;
        
        location = /management {
             try_files /management.html =404;
        }
        
        # проксируем запросы к Spring Boot
        location ~ ^/(api/v2/|swagger-ui/|v3/api-docs) {
            proxy_pass http://spring_boot_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/v2 {
            return 302 http://$host/swagger-ui/index.html;
        }
        location = /legacy {
            try_files /legacy.html =404;
        }
        location = /documentation {
            types { text/plain md; }
            try_files /Readme.md =404;
        }
        location = / {
            try_files /index.html =404;
        }
        location = /reserved {
            try_files /index.html =404;
        }

        # проксирование в админку H2
        location /admin/ {
            proxy_pass http://spring_boot_app/h2-console/;
            proxy_set_header Host $host;
        }

        location /status {
            stub_status;
            allow 127.0.0.1;
            deny all;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
