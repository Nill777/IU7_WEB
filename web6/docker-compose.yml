version: "3.9"

services:
  postgres:
    image: postgres:14-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: weblab_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring

  gateway:
    build: ./gateway-service
    environment:
      - SPRING_PROFILES_ACTIVE=gateway
      - SERVICE_CORE_URL=http://core:8080
      - SERVER_PORT=8080
    deploy:
      replicas: 3
    depends_on:
      - core
    networks:
      - monitoring

  core:
    build: ./core-service
    environment:
      - SPRING_PROFILES_ACTIVE=core
      - SERVICE_DATA_URL=http://data:8080
      - jwt.secret=ThisIsASecretKeyForWebLabAndItShouldBeLongEnoughAndSecureAndRandom123
      - jwt.expiration=3600000
      - SERVER_PORT=8080
    deploy:
      replicas: 3
    depends_on:
      - data
    networks:
      - monitoring

  data:
    build: ./data-service
    environment:
      - SPRING_PROFILES_ACTIVE=data
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/weblab_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVER_PORT=8080
    deploy:
      replicas: 3
    depends_on:
      - postgres
    networks:
      - monitoring

  # мониторинг
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/monitoring
    networks:
      - monitoring

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - gateway
    networks:
      - monitoring

networks:
  monitoring:

volumes:
  postgres_data:
