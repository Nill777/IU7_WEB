services:
  postgres:
    image: postgres:14-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: weblab_db
    ports:
      - "5432:5432"
    networks:
      - monitoring

  gateway:
    build: ./gateway-service
    deploy:
      replicas: 3
    networks:
      - monitoring
    depends_on:
      - postgres

  core:
    build: ./core-service
    deploy:
      replicas: 3
    networks:
      - monitoring
    depends_on:
      - postgres

  data:
    build: ./data-service
    deploy:
      replicas: 3
    networks:
      - monitoring
    depends_on:
      - postgres

  # мониторинг
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/monitoring
    networks:
      - monitoring

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - gateway
    networks:
      - monitoring

networks:
  monitoring: